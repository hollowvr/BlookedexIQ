<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/tabs/theme-editor.css">
  <script src="../scripts/content.js" defer></script>
  <script src="../scripts/editor.js" defer></script>
</head>

<body>
  <div id="editor">
    <div id="draggable" class="no-select">• • •</div>
    <h2>Create New Theme</h2>
    <div class="blookedex-row">
      <div class="color-row">
        <span>Primary</span>
        <input type="color" id="primary" value="#9A48AA" />
      </div>
      <div class="color-row">
        <span>Secondary</span>
        <input type="color" id="secondary" value="#07C2D0" />
      </div>
    </div>
    <div class="background-row">
      <span>Background</span>
      <div class="blookedex-row">
        <div id="bgPreview">Preview.</div>
        <div class="blookedex-column" style="height:100px;justify-content: space-between;">
          <div class="color-row-hid">
            <span>Top</span>
            <input type="color" id="top" value="#0bc2cf" />
          </div>
          <div class="color-row-hid">
            <span>Bottom</span>
            <input type="color" id="bottom" value="#349aef" />
          </div>
        </div>
      </div>
    </div>
    <button class="blookedex-closeBtnLarge" id="createBtn">
      <div class="blookedex-closeBtnLargeFront">Create!</div>
      <div class="blookedex-closeBtnLargeMiddle"></div>
      <div class="blookedex-closeBtnLargeShadow"></div>
    </button>
  </div>
  <div class="bg"></div>
  <div class="sidebar no-select">
    <img src="https://ac.blooket.com/dashclassic/assets/Blooket-M6jYh_hk.png" alt="Blooket" class="logo">
    <div class="play">
      <div class="shadow"></div>
      <div class="edge"></div>
      <div class="front">
        <div class="inside"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
            <path
              d="M187.2 100.9C174.8 94.1 159.8 94.4 147.6 101.6C135.4 108.8 128 121.9 128 136L128 504C128 518.1 135.5 531.2 147.6 538.4C159.7 545.6 174.8 545.9 187.2 539.1L523.2 355.1C536 348.1 544 334.6 544 320C544 305.4 536 291.9 523.2 284.9L187.2 100.9z" />
          </svg>
          Play</div>
      </div>
    </div>
    <div class="sidebar_list">
      <div>
        <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="chart-bar" role="img"
          xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <path fill="currentColor"
            d="M332.8 320h38.4c6.4 0 12.8-6.4 12.8-12.8V172.8c0-6.4-6.4-12.8-12.8-12.8h-38.4c-6.4 0-12.8 6.4-12.8 12.8v134.4c0 6.4 6.4 12.8 12.8 12.8zm96 0h38.4c6.4 0 12.8-6.4 12.8-12.8V76.8c0-6.4-6.4-12.8-12.8-12.8h-38.4c-6.4 0-12.8 6.4-12.8 12.8v230.4c0 6.4 6.4 12.8 12.8 12.8zm-288 0h38.4c6.4 0 12.8-6.4 12.8-12.8v-70.4c0-6.4-6.4-12.8-12.8-12.8h-38.4c-6.4 0-12.8 6.4-12.8 12.8v70.4c0 6.4 6.4 12.8 12.8 12.8zm96 0h38.4c6.4 0 12.8-6.4 12.8-12.8V108.8c0-6.4-6.4-12.8-12.8-12.8h-38.4c-6.4 0-12.8 6.4-12.8 12.8v198.4c0 6.4 6.4 12.8 12.8 12.8zM496 384H64V80c0-8.84-7.16-16-16-16H16C7.16 64 0 71.16 0 80v336c0 17.67 14.33 32 32 32h464c8.84 0 16-7.16 16-16v-32c0-8.84-7.16-16-16-16z">
          </path>
        </svg>
        <span>Stats</span>
      </div>
      <div class="selected">
        <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="suitcase" role="img"
          xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <path fill="currentColor"
            d="M128 480h256V80c0-26.5-21.5-48-48-48H176c-26.5 0-48 21.5-48 48v400zm64-384h128v32H192V96zm320 80v256c0 26.5-21.5 48-48 48h-48V128h48c26.5 0 48 21.5 48 48zM96 480H48c-26.5 0-48-21.5-48-48V176c0-26.5 21.5-48 48-48h48v352z">

          </path>
        </svg>
        <span>Market</span>
      </div>
      <div>
        <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="compass" role="img"
          xmlns="http://www.w3.org/2000/svg" viewBox="0 0 496 512">
          <path fill="currentColor"
            d="M225.38 233.37c-12.5 12.5-12.5 32.76 0 45.25 12.49 12.5 32.76 12.5 45.25 0 12.5-12.5 12.5-32.76 0-45.25-12.5-12.49-32.76-12.49-45.25 0zM248 8C111.03 8 0 119.03 0 256s111.03 248 248 248 248-111.03 248-248S384.97 8 248 8zm126.14 148.05L308.17 300.4a31.938 31.938 0 0 1-15.77 15.77l-144.34 65.97c-16.65 7.61-33.81-9.55-26.2-26.2l65.98-144.35a31.938 31.938 0 0 1 15.77-15.77l144.34-65.97c16.65-7.6 33.8 9.55 26.19 26.2z">

        </svg>

      </div>
      <div>

          xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512">
          <path fill="currentColor"
            d="M402.6 83.2l90.2 90.2c3.8 3.8 3.8 10 0 13.8L274.4 405.6l-92.8 10.3c-12.4 1.4-22.9-9.1-21.5-21.5l10.3-92.8L388.8 83.2c3.8-3.8 10-3.8 13.8 0zm162-22.9l-48.8-48.8c-15.2-15.2-39.9-15.2-55.2 0l-35.4 35.4c-3.8 3.8-3.8 10 0 13.8l90.2 90.2c3.8 3.8 10 3.8 13.8 0l35.4-35.4c15.2-15.3 15.2-40 0-55.2zM384 346.2V448H64V128h229.8c3.2 0 6.2-1.3 8.5-3.5l40-40c7.6-7.6 2.2-20.5-8.5-20.5H48C21.5 64 0 85.5 0 112v352c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V306.2c0-10.7-12.9-16-20.5-8.5l-40 40c-2.2 2.3-3.5 5.3-3.5 8.5z">
          </path>
        </svg>
        <span>Set Creator</span>
      </div>
      <div>
        <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="list" role="img"
          xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <path fill="currentColor"
            d="M80 368H16a16 16 0 0 0-16 16v64a16 16 0 0 0 16 16h64a16 16 0 0 0 16-16v-64a16 16 0 0 0-16-16zm0-320H16A16 16 0 0 0 0 64v64a16 16 0 0 0 16 16h64a16 16 0 0 0 16-16V64a16 16 0 0 0-16-16zm0 160H16a16 16 0 0 0-16 16v64a16 16 0 0 0 16 16h64a16 16 0 0 0 16-16v-64a16 16 0 0 0-16-16zm416 176H176a16 16 0 0 0-16 16v32a16 16 0 0 0 16 16h320a16 16 0 0 0 16-16v-32a16 16 0 0 0-16-16zm0-320H176a16 16 0 0 0-16 16v32a16 16 0 0 0 16 16h320a16 16 0 0 0 16-16V80a16 16 0 0 0-16-16zm0 160H176a16 16 0 0 0-16 16v32a16 16 0 0 0 16 16h320a16 16 0 0 0 16-16v-32a16 16 0 0 0-16-16z">
          </path>
        </svg>
        <span>My Sets</span>
      </div>
      <div>
        <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="star" role="img"
          xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512">
          <path fill="currentColor"
            d="M259.3 17.8L194 150.2 47.9 171.5c-26.2 3.8-36.7 36.1-17.7 54.6l105.7 103-25 145.5c-4.5 26.3 23.2 46 46.4 33.7L288 439.6l130.7 68.7c23.2 12.2 50.9-7.4 46.4-33.7l-25-145.5 105.7-103c19-18.5 8.5-50.8-17.7-54.6L382 150.2 316.7 17.8c-11.7-23.6-45.6-23.9-57.4 0z">
          </path>
        </svg>
        <span>Favorites</span>
      </div>
    </div>
  </div>
  <div class="content">
    <h1>Header</h1>
    <div class="classPass">
      <h1>Class Pass</h1>
    </div>
    <h1>Boxes</h1>
    <div class="blookedex-row" style="height:50%;">
      <div class="box" style="width:400px;"></div>
      <div class="box" style="background:var(--primaryDark);"></div>
    </div>
  </div>
</body>
